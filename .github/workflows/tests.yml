name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

jobs:
  test:
    name: Python
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v13
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      pyproject-directory: .
      coverage-directory: tscompare
    secrets: inherit
    strategy:
      matrix:
        python: ["3.11", "3.13"]
        os: [macos-latest, ubuntu-24.04, windows-latest]
